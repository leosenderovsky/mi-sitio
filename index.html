<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- SEO base (react-helmet-async lo sobreescribe por página) -->
    <title>Leo Aquiba Senderovsky | Editor de Video | Consultor de Guión | Docente de Cine | Desarrollador Web | IA</title>
    <meta name="description" content="Leo Aquiba Senderovsky: editor de video senior, guionista, consultor de guión, docente de cine, desarrollador web Frontend y especialista en IA. Buenos Aires, Argentina." />
    <meta name="author" content="Leo Aquiba Senderovsky" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Geo -->
    <meta name="geo.region" content="AR-C" />
    <meta name="geo.placename" content="Buenos Aires, Argentina" />
    <meta name="ICBM" content="-34.6037, -58.3816" />

    <!-- OG fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Leo Senderovsky" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:image" content="https://leosenderovsky.com.ar/assets/img/og-social-preview.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@leosenderovsky" />

    <!-- Theme color -->
    <meta name="theme-color" content="#3844BE" />

    <!-- Preconexiones -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://api.web3forms.com" />

    <!-- Preloads críticos para Performance -->
    <!-- Hero home - responsive preload -->
    <link
      rel="preload"
      as="image"
      href="/assets/img/hero-area-office.webp"
      imagesrcset="
        /assets/img/hero-area-office-640w.webp 640w,
        /assets/img/hero-area-office-960w.webp 960w,
        /assets/img/hero-area-office-1280w.webp 1280w,
        /assets/img/hero-area-office-1920w.webp 1920w,
        /assets/img/hero-area-office.webp 4000w"
      imagesizes="(max-width: 768px) 100vw, 50vw"
      fetchpriority="high"
    />
    <link rel="preload" href="/assets/img/video-editor-fondo.webp" as="image" fetchpriority="high" />
    <link rel="preload" href="/assets/img/web-dev-fondo.webp" as="image" fetchpriority="high" />
    <link rel="preload" href="/assets/img/ia-fondo.webp" as="image" fetchpriority="high" />

    <!-- Fuentes (no bloqueantes) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Yanone+Kaffeesatz:wght@200..700&family=Shadows+Into+Light&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Yanone+Kaffeesatz:wght@200..700&family=Shadows+Into+Light&display=swap" />
    </noscript>

    <script>
      // GA4 carga solo con consentimiento explícito
      window.__enableGA = function() {
        if (window.__gaLoaded) return;
        window.__gaLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-5R825ZYTN5';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-5R825ZYTN5');
      };
      // Si ya había consentimiento previo, cargar GA inmediatamente
      if (localStorage.getItem('cookie_consent') === 'accepted') {
        window.__enableGA();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

    <!-- Estilos externos (No críticos diferidos al final para liberar ancho de banda LCP) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="/assets/fonts/lineicons.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="/assets/fonts/flag-icons.min.css" media="print" onload="this.media='all'" />
  </body>
</html>
