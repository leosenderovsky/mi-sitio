<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @font-face {
        font-family: 'Yanone Kaffeesatz';
        font-weight: 700;
        src: url('data:font/woff2;base64,') format('woff2');
      }
    </style>
    <clipPath id="triClip">
      <polygon points="6,6 6,58 60,32"/>
    </clipPath>
  </defs>

  <!-- Fondo teal -->
  <rect width="64" height="64" rx="10" ry="10" fill="#016262"/>

  <!-- Triángulo blanco -->
  <polygon points="6,6 6,58 60,32" fill="#FFFFFF"/>

  <!-- LS en Electric Blue, clipeado al triángulo -->
  <text
    clip-path="url(#triClip)"
    x="5"
    y="45"
    font-family="'Yanone Kaffeesatz', 'Bebas Neue', Impact, sans-serif"
    font-weight="700"
    font-size="37"
    fill="#0128E2"
    letter-spacing="1"
  >LS</text>

</svg>